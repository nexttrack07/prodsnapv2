[build]
  command = "pnpm build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; img-src 'self' https: data: blob:; script-src 'self' https://*.clerk.accounts.dev https://clerk.prodsnap.io https://accounts.prodsnap.io https://*.convex.cloud 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.clerk.accounts.dev https://clerk.prodsnap.io https://accounts.prodsnap.io https://*.convex.cloud wss://*.convex.cloud https://api.fal.ai https://*.fal.ai https://*.r2.cloudflarestorage.com https://*.r2.dev https://api.stripe.com; frame-src https://*.clerk.accounts.dev https://clerk.prodsnap.io https://accounts.prodsnap.io https://js.stripe.com https://*.stripe.com; worker-src 'self' blob:"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
